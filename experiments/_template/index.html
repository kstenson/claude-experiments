<!DOCTYPE html>
<!--
  ┌─────────────────────────────────────────────────────────────────────┐
  │  EXPERIMENT TEMPLATE                                                   │
  │                                                                       │
  │  Copy this whole folder to experiments/<YYYY-MM-DD>/ and fill in      │
  │  every {{PLACEHOLDER}}. Replace the demo content in <main> and the    │
  │  <script> marked "YOUR EXPERIMENT" with the actual idea.              │
  │                                                                       │
  │  Keep, do NOT remove:                                                 │
  │   • the "← all experiments" back link                                 │
  │   • the "✎ the story behind this one" button                          │
  │   • the .story overlay, written honestly in first person:             │
  │       – Why I picked it                                               │
  │       – What I enjoy about it                                         │
  │       – Something you might take away                                 │
  │                                                                       │
  │  Standalone only: no build step, no external dependencies.            │
  └─────────────────────────────────────────────────────────────────────┘
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}} — Experiment {{NNN}}</title>
<meta name="description" content="{{ONE_LINE_DESCRIPTION}}" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%A8%3C/text%3E%3C/svg%3E" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: #05050a;
    color: #e9e9f0;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
  }

  /* ---- Stage: where the experiment lives ---- */
  .stage { position: fixed; inset: 0; }

  /* ---- Floating panel (title + controls + story button) ---- */
  .ui {
    position: fixed;
    z-index: 10;
    left: 24px;
    top: 24px;
    max-width: 320px;
    background: rgba(10, 10, 18, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 22px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .ui.hidden { opacity: 0; transform: translateY(-10px); pointer-events: none; }
  .back { font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase; color: #9a9ab0; text-decoration: none; }
  .back:hover { color: #7c7cff; }
  h1 { font-size: 1.4rem; margin: 12px 0 6px; letter-spacing: -0.01em; }
  .sub { font-size: 0.85rem; color: #9a9ab0; margin-bottom: 16px; }

  /* Put any sliders/buttons for the experiment here */
  .controls { display: grid; gap: 12px; }

  /* The story button — prominent on purpose, every page has one */
  .story-btn {
    margin-top: 16px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: linear-gradient(120deg, rgba(124,124,255,0.22), rgba(255,124,195,0.22));
    border: 1px solid rgba(179,136,255,0.45);
    color: #e9d8ff;
    border-radius: 11px;
    padding: 11px 14px;
    font-size: 0.88rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.1s ease;
  }
  .story-btn:hover { background: linear-gradient(120deg, rgba(124,124,255,0.36), rgba(255,124,195,0.36)); }
  .story-btn:active { transform: scale(0.97); }

  /* ---- Narrative overlay ---- */
  .story {
    position: fixed; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
    background: rgba(5, 5, 10, 0.78);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.35s ease;
  }
  .story.open { opacity: 1; pointer-events: auto; }
  .story-card {
    max-width: 620px; max-height: 84vh; overflow-y: auto;
    background-color: #13131d;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 38px 40px;
    transform: translateY(12px) scale(0.98);
    transition: transform 0.35s ease;
  }
  .story.open .story-card { transform: none; }
  .story-card .kicker { font-size: 0.75rem; letter-spacing: 0.22em; text-transform: uppercase; color: #7c7cff; margin: 0 0 8px; }
  .story-card h2 { font-size: 1.6rem; margin: 0 0 18px; letter-spacing: -0.01em; }
  .story-card h3 { font-size: 0.8rem; letter-spacing: 0.14em; text-transform: uppercase; color: #ff7cc3; margin: 24px 0 8px; }
  .story-card p { color: #c7c7d6; font-size: 0.98rem; line-height: 1.7; margin: 0 0 14px; }
  .story-card .close {
    margin-top: 26px;
    background: rgba(124,124,255,0.16);
    border: 1px solid rgba(124,124,255,0.4);
    color: #cfcfff; border-radius: 10px; padding: 10px 18px; font-size: 0.85rem; cursor: pointer;
  }
  .story-card .close:hover { background: rgba(124,124,255,0.3); }

  .hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10;
    font-size: 0.78rem; color: rgba(255,255,255,0.4); letter-spacing: 0.05em;
    pointer-events: none; text-align: center;
  }
</style>
</head>
<body>
  <!-- Replace with your canvas / DOM / SVG content -->
  <div class="stage" id="stage"></div>

  <div class="ui" id="ui">
    <a class="back" href="../../index.html">← all experiments</a>
    <h1>{{TITLE}}</h1>
    <p class="sub">Experiment № {{NNN}} · {{HUMAN_DATE}}</p>

    <div class="controls">
      <!-- {{CONTROLS}} — sliders/buttons for the experiment, or remove this block -->
    </div>

    <button class="story-btn" id="openStory">✎ the story behind this one</button>
  </div>

  <p class="hint">{{INTERACTION_HINT}}</p>

  <div class="story" id="story">
    <div class="story-card">
      <p class="kicker">Experiment № {{NNN}} · The story</p>
      <h2>{{TITLE}}</h2>

      <h3>Why I picked it</h3>
      <p>{{WHY_I_PICKED_IT}}</p>

      <h3>What I enjoy about it</h3>
      <p>{{WHAT_I_ENJOY}}</p>

      <h3>Something you might take away</h3>
      <p>{{THE_TAKEAWAY}}</p>

      <button class="close" id="closeStory">Back to it</button>
    </div>
  </div>

<script>
  // ---- Narrative overlay wiring (keep) ----
  const story = document.getElementById('story');
  document.getElementById('openStory').addEventListener('click', () => story.classList.add('open'));
  document.getElementById('closeStory').addEventListener('click', () => story.classList.remove('open'));
  story.addEventListener('click', (e) => { if (e.target === story) story.classList.remove('open'); });
  window.addEventListener('keydown', (e) => {
    if (e.key.toLowerCase() === 'h') document.getElementById('ui').classList.toggle('hidden');
    if (e.key === 'Escape') story.classList.remove('open');
  });

  // ---- YOUR EXPERIMENT ----
  // Build the actual idea here, rendering into #stage.
  (() => {
    // ...
  })();
</script>
</body>
</html>
