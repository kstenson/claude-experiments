<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Song Bird — the world, set to music</title>
  <meta name="description" content="A daily generative song and lyrics, composed from the tone of the day." />
  <link rel="stylesheet" href="styles.css" />
  <!-- Strudel: live-coded music patterns with internet samples -->
  <script src="https://unpkg.com/@strudel/web@1.0.3"></script>
</head>
<body>
  <main class="stage">
    <header class="head">
      <a href="../index.html" style="display:inline-block;margin-bottom:10px;color:var(--accent);font-size:12px;letter-spacing:.1em;text-decoration:none">← ALL EXPERIMENTS</a>
      <p class="kicker">SONG BIRD</p>
      <h1 id="title">…</h1>
      <p class="date"><span id="date">…</span> · <span id="genre">…</span></p>
    </header>

    <section class="player">
      <button id="play" class="play" aria-label="Play the song of the day">
        <span class="play-icon">►</span>
        <span class="play-label">Play today's song</span>
      </button>
      <div class="meta">
        <span id="mood-label" class="mood">…</span>
        <div class="bar" title="Mood score"><div id="mood-fill" class="bar-fill"></div></div>
      </div>
    </section>

    <details id="voice-panel" class="voice-panel">
      <summary><span class="gear">𝄞</span> Voice</summary>
      <div class="voice-grid">
        <label class="voice-row toggle">
          <input type="checkbox" id="voice-enabled" checked />
          <span>Speak the lyrics</span>
        </label>
        <label class="voice-row">
          <span class="voice-name">Voice</span>
          <select id="voice-select" aria-label="Choose a voice"></select>
        </label>
        <label class="voice-row">
          <span>Speed <em id="rate-val"></em></span>
          <input type="range" id="voice-rate" min="0.5" max="1.4" step="0.05" aria-label="Speech speed" />
        </label>
        <label class="voice-row">
          <span>Pitch <em id="pitch-val"></em></span>
          <input type="range" id="voice-pitch" min="0.5" max="1.5" step="0.05" aria-label="Speech pitch" />
        </label>
        <button type="button" id="voice-reset" class="voice-reset">Reset to mood default</button>
      </div>
    </details>

    <section class="summary">
      <p id="summary">…</p>
    </section>

    <nav id="archive" class="archive" hidden>
      <label for="history">Previous days</label>
      <select id="history" aria-label="Browse previous days"></select>
    </nav>

    <section id="lyrics" class="lyrics"></section>

    <footer class="foot">
      <p>
        Composed by Claude from
        <a id="source" href="#" target="_blank" rel="noopener">the day's reading</a>.
        Music composed with <a href="https://strudel.cc" target="_blank" rel="noopener">Strudel</a>, lyrics spoken by your browser's voice. Samples loaded on demand from across the internet.
      </p>
      <p class="fine">Regenerated daily · <span id="genby"></span></p>
      <p class="fine" id="sample-info" hidden></p>
    </footer>
  </main>

  <script src="engine.js"></script>
</body>
</html>
