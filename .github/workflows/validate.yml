name: Validate experiments

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate experiment pages
        run: node scripts/validate.mjs
